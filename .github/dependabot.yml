version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "nuget"
    directory: "/src/LaunchDarkly.InternalSdk"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
  - package-ecosystem: "nuget"
    directory: "/test/LaunchDarkly.InternalSdk.Tests"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
