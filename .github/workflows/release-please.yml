name: Release Please
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write

    outputs:
      dotnet-sdk-internal-released: ${{ steps.release.outputs.release_created }}

    steps:
      # Create any releases first, then create tags, and then optionally create any new PRs.
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          skip-github-pull-request: true

      # Need the repository content to be able to create and push a tag.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Create release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists, skipping creation."
          else
            echo "Creating tag ${TAG_NAME}."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        if: ${{ steps.release.outputs.release_created != 'true' }}
        id: release-prs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          skip-github-release: true

  release-sdk-internal:
    runs-on: ubuntu-22.04
    needs: release-please
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      attestations: write
    if: ${{ needs.release-please.outputs.dotnet-sdk-internal-released == 'true'}}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Env from project's Env file
        shell: bash
        run: echo "$(cat src/LaunchDarkly.InternalSdk/github_actions.env)" >> $GITHUB_ENV

      - uses: ./.github/actions/full-release
        id: full-release
        with:
          workspace_path: ${{ env.WORKSPACE_PATH }}
          project_file: ${{ env.PROJECT_FILE }}
          build_output_path: ${{ env.BUILD_OUTPUT_PATH }}
          test_project_file: ${{ env.TEST_PROJECT_FILE }}
          dll_name: ${{ env.BUILD_OUTPUT_DLL_NAME }}
          dry_run: false
          aws_role: ${{ vars.AWS_ROLE_ARN }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: 'nupkgs/*'
