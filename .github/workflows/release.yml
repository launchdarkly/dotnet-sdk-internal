name: Publish Package
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Is this a dry run. If so no package will be published.'
        type: boolean
        required: true
      generate_provenance:
        description: 'Whether or not to generate provenance for this publish. Default behavior: generate only on main branch.'
        type: choice
        options:
          - Default
          - Generate
          - Do not generate
      publish_release:
        description: 'Whether to publish (un-draft) a GitHub release after uploading artifacts.'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Env from project's Env file
        shell: bash
        run: echo "$(cat src/LaunchDarkly.InternalSdk/github_actions.env)" >> $GITHUB_ENV

      - uses: ./.github/actions/full-release
        id: full-release
        with:
          workspace_path: ${{ env.WORKSPACE_PATH }}
          project_file: ${{ env.PROJECT_FILE }}
          build_output_path: ${{ env.BUILD_OUTPUT_PATH }}
          test_project_file: ${{ env.TEST_PROJECT_FILE }}
          dll_name: ${{ env.BUILD_OUTPUT_DLL_NAME }}
          dry_run: ${{ inputs.dry_run }}
          aws_role: ${{ vars.AWS_ROLE_ARN }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate checksums file
        if: |
          !inputs.dry_run && (inputs.generate_provenance == 'Generate' || (inputs.generate_provenance == 'Default' && github.ref_name == 'main'))
        env:
          HASHES: ${{ steps.full-release.outputs.hashes }}
        run: |
          echo "$HASHES" | base64 -d > checksums.txt

      - name: Attest build provenance
        if: |
          !inputs.dry_run && (inputs.generate_provenance == 'Generate' || (inputs.generate_provenance == 'Default' && github.ref_name == 'main'))
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

  publish-release:
    needs: ['build']
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release edit "${{ github.ref_name }}"
          --repo ${{ github.repository }}
          --draft=false
